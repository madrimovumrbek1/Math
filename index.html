<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notes App | Zamonaviy eslatmalar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
        }

        /* CSS Variables for Themes */
        :root {
            --bg-gradient-start: #e0e5ec;
            --bg-gradient-end: #f0f4f8;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-solid: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --shadow: 20px 20px 40px rgba(0, 0, 0, 0.05), -20px -20px 40px rgba(255, 255, 255, 0.8);
            --shadow-inset: inset 5px 5px 12px rgba(0, 0, 0, 0.05), inset -5px -5px 12px rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.3);
            --card-bg: rgba(255, 255, 255, 0.6);
            --delete-btn: #ef4444;
            --edit-btn: #10b981;
        }

        body.dark {
            --bg-gradient-start: #0f0f1e;
            --bg-gradient-end: #1a1a2e;
            --surface: rgba(30, 30, 46, 0.8);
            --surface-solid: #1e1e2e;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --shadow: 10px 10px 20px rgba(0, 0, 0, 0.3), -10px -10px 20px rgba(255, 255, 255, 0.05);
            --shadow-inset: inset 3px 3px 8px rgba(0, 0, 0, 0.3), inset -3px -3px 8px rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(30, 30, 46, 0.5);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            padding: 20px;
            transition: all 0.4s ease;
        }

        /* Glassmorphic Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface-solid);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 18px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            color: var(--text-primary);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* Add Note Card */
        .add-note-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }

        .add-note-card h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .note-input {
            width: 100%;
            padding: 18px;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-inset);
        }

        .note-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        /* Search Bar */
        .search-section {
            margin-bottom: 30px;
            animation: fadeInUp 0.7s ease;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 16px;
            color: var(--text-primary);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Notes Grid */
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .notes-header h2 {
            color: var(--text-primary);
            font-size: 1.6rem;
        }

        .note-count {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            animation: fadeInUp 0.8s ease;
        }

        /* Note Card */
        .note-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: fadeInScale 0.4s ease;
        }

        .note-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .note-content {
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            word-wrap: break-word;
            white-space: pre-wrap;
            min-height: 80px;
        }

        .note-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-actions {
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .edit-btn {
            background: var(--edit-btn);
            color: white;
        }

        .edit-btn:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .delete-btn {
            background: var(--delete-btn);
            color: white;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            margin-top: 40px;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Modal for Edit */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--surface-solid);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }

        .modal-content h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .modal-textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--surface);
            color: var(--text-primary);
            font-size: 16px;
            resize: vertical;
            min-height: 150px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .save-edit, .cancel-edit {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .save-edit {
            background: var(--accent);
            color: white;
        }

        .cancel-edit {
            background: var(--delete-btn);
            color: white;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .notes-grid {
                grid-template-columns: 1fr;
            }
            
            .add-note-card {
                padding: 24px;
            }
            
            .theme-toggle {
                top: 16px;
                right: 16px;
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .note-card:hover {
                transform: translateY(-4px);
            }
            
            .note-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>

    <div class="container">
        <div class="header">
            <h1>📝 Notes App</h1>
            <p>Eslatmalaringizni chiroyli va tartibli saqlang</p>
        </div>

        <div class="add-note-card">
            <h2>✍️ Yangi eslatma</h2>
            <textarea class="note-input" id="noteInput" placeholder="Bugun nimalar qildingiz? Muhim fikrlaringizni yozib qo'ying..."></textarea>
            <button class="add-btn" onclick="addNote()">➕ Eslatma qo'shish</button>
        </div>

        <div class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Eslatmalar ichidan qidirish..." onkeyup="searchNotes()">
        </div>

        <div class="notes-header">
            <h2>📋 Barcha eslatmalar</h2>
            <span class="note-count" id="noteCount">0 ta</span>
        </div>

        <div class="notes-grid" id="notesGrid"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Eslatmani tahrirlash</h3>
            <textarea class="modal-textarea" id="editTextarea"></textarea>
            <div class="modal-actions">
                <button class="save-edit" onclick="saveEdit()">💾 Saqlash</button>
                <button class="cancel-edit" onclick="closeModal()">❌ Bekor qilish</button>
            </div>
        </div>
    </div>

    <script>
        // Notes array
        let notes = [];
        let currentEditId = null;

        // Load notes from localStorage
        function loadNotes() {
            const saved = localStorage.getItem('notes_app_data');
            if(saved) {
                notes = JSON.parse(saved);
            } else {
                // Sample notes
                notes = [
                    {
                        id: Date.now(),
                        text: "✨ MATH AI loyihasini yakunladim! Juda zo'r bo'ldi.",
                        date: new Date().toISOString()
                    },
                    {
                        id: Date.now() + 1,
                        text: "📚 Ertaga matematika darsiga tayyorgarlik ko'rish kerak.\nAlgebra va Geometriya takrorlash.",
                        date: new Date().toISOString()
                    },
                    {
                        id: Date.now() + 2,
                        text: "💡 Yangi notes app yasashni o'rgandim. localStorage va zamonaviy dizayn juda qiziqarli!",
                        date: new Date().toISOString()
                    }
                ];
                saveNotes();
            }
            renderNotes();
        }

        // Save notes to localStorage
        function saveNotes() {
            localStorage.setItem('notes_app_data', JSON.stringify(notes));
        }

        // Add new note
        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if(text === '') {
                alert('Iltimos, eslatma matnini kiriting!');
                return;
            }
            
            const newNote = {
                id: Date.now(),
                text: text,
                date: new Date().toISOString()
            };
            
            notes.unshift(newNote); // Add to beginning
            saveNotes();
            renderNotes();
            input.value = '';
            
            // Animation effect
            const grid = document.getElementById('notesGrid');
            grid.style.animation = 'none';
            setTimeout(() => {
                grid.style.animation = 'fadeInUp 0.8s ease';
            }, 10);
        }

        // Delete note
        function deleteNote(id) {
            if(confirm('Ushbu eslatmani o\'chirmoqchimisiz?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotes();
                renderNotes();
            }
        }

        // Open edit modal
        function openEditModal(id) {
            const note = notes.find(n => n.id === id);
            if(note) {
                currentEditId = id;
                document.getElementById('editTextarea').value = note.text;
                document.getElementById('editModal').style.display = 'flex';
            }
        }

        // Save edited note
        function saveEdit() {
            const newText = document.getElementById('editTextarea').value.trim();
            if(newText === '') {
                alert('Eslatma matni bo\'sh bo\'lishi mumkin emas!');
                return;
            }
            
            const noteIndex = notes.findIndex(n => n.id === currentEditId);
            if(noteIndex !== -1) {
                notes[noteIndex].text = newText;
                notes[noteIndex].date = new Date().toISOString();
                saveNotes();
                renderNotes();
            }
            closeModal();
        }

        // Close modal
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditId = null;
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if(diffMins < 1) return 'Hozirgina';
            if(diffMins < 60) return `${diffMins} daqiqa oldin`;
            if(diffHours < 24) return `${diffHours} soat oldin`;
            if(diffDays < 7) return `${diffDays} kun oldin`;
            return date.toLocaleDateString('uz-UZ');
        }

        // Search notes
        let searchTimeout;
        function searchNotes() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderNotes();
            }, 300);
        }

        // Render notes
        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filteredNotes = [...notes];
            
            if(searchTerm) {
                filteredNotes = filteredNotes.filter(note => 
                    note.text.toLowerCase().includes(searchTerm)
                );
            }
            
            document.getElementById('noteCount').innerText = `${filteredNotes.length} ta`;
            
            if(filteredNotes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>${searchTerm ? 'Qidiruv bo\'yicha hech narsa topilmadi' : 'Hozircha hech qanday eslatma yo\'q'}</p>
                        <p style="font-size: 14px; margin-top: 10px;">${searchTerm ? 'Boshqa so\'z bilan qidirib ko\'ring' : 'Yuqoridagi maydonga birinchi eslatmangizni yozing'}</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredNotes.map(note => `
                <div class="note-card">
                    <div class="note-date">
                        📅 ${formatDate(note.date)}
                    </div>
                    <div class="note-content">${escapeHtml(note.text)}</div>
                    <div class="note-actions">
                        <button class="edit-btn" onclick="openEditModal(${note.id})">
                            ✏️ Tahrirlash
                        </button>
                        <button class="delete-btn" onclick="deleteNote(${note.id})">
                            🗑 O'chirish
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if(document.body.classList.contains('dark')) {
                btn.innerHTML = '☀️ Light Mode';
                localStorage.setItem('notes_theme', 'dark');
            } else {
                btn.innerHTML = '🌙 Dark Mode';
                localStorage.setItem('notes_theme', 'light');
            }
        }
        
        // Load theme preference
        function loadTheme() {
            const savedTheme = localStorage.getItem('notes_theme');
            if(savedTheme === 'dark') {
                document.body.classList.add('dark');
                document.querySelector('.theme-toggle').innerHTML = '☀️ Light Mode';
            } else {
                document.querySelector('.theme-toggle').innerHTML = '🌙 Dark Mode';
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if(event.target === modal) {
                closeModal();
            }
        }
        
        // Initialize
        loadTheme();
        loadNotes();
    </script>
</body>
</html>
