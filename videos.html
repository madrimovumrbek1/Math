<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH AI - Video darsliklar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #f0f2f5;
        }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(255,255,255,0.2);
        }

        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        /* Header */
        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #6b7280;
        }

        /* Search and Filter */
        .search-section {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .search-box {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .category-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: #f3f4f6;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }

        .video-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .thumbnail {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .thumbnail .play-icon {
            font-size: 60px;
            color: white;
            opacity: 0.9;
            transition: all 0.3s;
        }

        .video-card:hover .play-icon {
            transform: scale(1.1);
            opacity: 1;
        }

        .thumbnail-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .video-info {
            padding: 20px;
        }

        .video-category {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .video-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .video-desc {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .watch-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .watch-btn:hover {
            transform: translateX(5px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 900px;
            background: black;
            border-radius: 20px;
            overflow: hidden;
        }

        .modal-content iframe {
            width: 100%;
            height: 500px;
            border: none;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .modal-content iframe {
                height: 300px;
            }
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">📐 MATH AI</div>
        <div class="nav-links">
            <a href="dashboard.html">🏠 Bosh sahifa</a>
            <a href="calendar.html">📅 Vazifalar</a>
            <a href="videos.html" class="active">📹 Darsliklar</a>
            <a href="admin.html">⚙️ Admin</a>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Chiqish</button>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>📹 Video darsliklar</h1>
            <p>Matematikadan interaktiv darslar, siz uchun maxsus</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Darsliklarni qidirish..." onkeyup="searchVideos()">
            </div>
            <div class="category-filters" id="categoryFilters">
                <button class="cat-btn active" onclick="filterByCategory('all')">📚 Barchasi</button>
            </div>
        </div>

        <div class="video-grid" id="videoGrid"></div>
    </div>

    <!-- Modal for video -->
    <div id="videoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        let videos = [];
        let currentCategory = 'all';
        let searchTerm = '';

        function loadVideos() {
            const saved = localStorage.getItem('math_videos');
            if(saved) {
                videos = JSON.parse(saved);
            } else {
                videos = [
                    {id: 1, title: "Algebra - Asosiy tushunchalar", desc: "Algebra fanining asosiy qoidalari va formulalar bilan tanishing", category: "Algebra", url: "https://www.youtube.com/embed/dQw4w9WgXcQ"},
                    {id: 2, title: "Geometriya - Uchburchaklar", desc: "Uchburchaklar turlari va ularning xossalari", category: "Geometriya", url: "https://www.youtube.com/embed/dQw4w9WgXcQ"},
                    {id: 3, title: "Trigonometriya - Sinus va Kosinus", desc: "Trigonometrik funksiyalar asoslari va ularning qo'llanilishi", category: "Trigonometriya", url: "https://www.youtube.com/embed/dQw4w9WgXcQ"},
                    {id: 4, title: "Funksiyalar va Grafiklar", desc: "Chiziqli va kvadrat funksiyalar, ularning grafiklari", category: "Algebra", url: "https://www.youtube.com/embed/dQw4w9WgXcQ"},
                    {id: 5, title: "Ko'phadlar", desc: "Ko'phadlarni qo'shish, ayirish va ko'paytirish", category: "Algebra", url: "https://www.youtube.com/embed/dQw4w9WgXcQ"}
                ];
                saveVideos();
            }
            renderCategories();
            renderVideos();
        }

        function saveVideos() {
            localStorage.setItem('math_videos', JSON.stringify(videos));
            updateDashboardStats();
        }

        function renderCategories() {
            const categories = ['all', ...new Set(videos.map(v => v.category))];
            const filterDiv = document.getElementById('categoryFilters');
            filterDiv.innerHTML = categories.map(cat => `
                <button class="cat-btn ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">
                    ${cat === 'all' ? '📚 Barchasi' : cat}
                </button>
            `).join('');
        }

        function filterByCategory(category) {
            currentCategory = category;
            renderCategories();
            renderVideos();
        }

        function searchVideos() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderVideos();
        }

        function renderVideos() {
            let filtered = [...videos];
            
            if(currentCategory !== 'all') {
                filtered = filtered.filter(v => v.category === currentCategory);
            }
            
            if(searchTerm) {
                filtered = filtered.filter(v => 
                    v.title.toLowerCase().includes(searchTerm) || 
                    v.desc.toLowerCase().includes(searchTerm) ||
                    v.category.toLowerCase().includes(searchTerm)
                );
            }
            
            const grid = document.getElementById('videoGrid');
            
            if(filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        📭 Hech qanday video topilmadi
                        <br><small>Boshqa so'z bilan qidirib ko'ring</small>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filtered.map(video => `
                <div class="video-card">
                    <div class="thumbnail" onclick="openVideo('${video.url}')">
                        <div class="play-icon">▶</div>
                        <div class="thumbnail-badge">📹 Video</div>
                    </div>
                    <div class="video-info">
                        <span class="video-category">${video.category}</span>
                        <div class="video-title">${video.title}</div>
                        <div class="video-desc">${video.desc || 'Tavsif mavjud emas'}</div>
                        <button class="watch-btn" onclick="openVideo('${video.url}')">▶ Ko'rish →</button>
                    </div>
                </div>
            `).join('');
        }

        function openVideo(url) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = '';
            modal.style.display = 'none';
        }

        function updateDashboardStats() {
            if(window.updateStats) window.updateStats();
        }

        function logout() {
            localStorage.removeItem('math_logged_in');
            window.location.href = 'index.html';
        }

        if(localStorage.getItem('math_logged_in') !== 'true') {
            window.location.href = 'index.html';
        }

        loadVideos();
    </script>
</body>
</html>
